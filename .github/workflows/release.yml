name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Dispatch extended-data continuous delivery
        if: steps.release.outputs['packages/extended-data--release_created'] == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs['packages/extended-data--tag_name'] }}
        run: gh workflow run cd.yml --repo "$GH_REPO" --ref main -f tag="$RELEASE_TAG" -f package="extended-data"
      - name: Dispatch pytest-extended-data continuous delivery
        if: steps.release.outputs['packages/pytest-extended-data--release_created'] == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs['packages/pytest-extended-data--tag_name'] }}
        run: gh workflow run cd-pytest-extended-data.yml --repo "$GH_REPO" --ref main -f tag="$RELEASE_TAG"
