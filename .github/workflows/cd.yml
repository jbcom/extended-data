name: CD

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish and deploy
        required: true
        type: string
      package:
        description: Workspace package to publish
        required: true
        type: string

permissions: {}

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.19"
          enable-cache: true
      - run: uv sync --all-packages --all-extras --dev
      - run: uv tool install tox --with tox-uv --with tox-gh
      - run: tox -e "py$(echo '${{ matrix.python-version }}' | tr -d '.')"

  quality:
    name: Quality, docs, and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.19"
          enable-cache: true
      - run: uv sync --all-packages --all-extras --dev
      - run: uv tool install tox --with tox-uv --with tox-gh
      - run: tox -e lint,typecheck,audit,examples,docs,build

  publish-package:
    name: Publish package to PyPI
    needs: [test, quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.19"
          enable-cache: true
      - name: Validate package input
        run: |
          case "${{ inputs.package }}" in
            extended-data|pytest-extended-data) ;;
            *) echo "unsupported package: ${{ inputs.package }}" >&2; exit 1 ;;
          esac
      - run: uv build --package "${{ inputs.package }}" --out-dir dist --clear
      - run: uv publish --trusted-publishing always dist/*

  publish-docs:
    name: Publish docs to GitHub Pages
    if: inputs.package == 'extended-data'
    needs: publish-package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.19"
          enable-cache: true
      - run: uv sync --all-packages --all-extras --dev
      - run: uv tool install tox --with tox-uv --with tox-gh
      - run: tox -e docs
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/extended-data/docs/_build/html
      - id: deployment
        name: Deploy docs
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
