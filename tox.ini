[tox]
requires =
    tox>=4.11
    tox-uv>=1.11
    tox-gh>=1.3
env_list =
    lint
    typecheck
    audit
    py311
    py312
    py313
    py314
    examples
    docs
    build
min_version = 4.11
skip_missing_interpreters = true

[gh]
python =
    3.11 = py311
    3.12 = py312
    3.13 = py313
    3.14 = py314

[testenv]
description = Run package tests
deps = .[all,tests]
commands =
    pytest tests --cov=extended_data --cov-report=xml:coverage.xml --cov-report=term-missing {posargs}

[testenv:py{311,312,313,314}]
description = Run package tests on Python {base_python}
commands = {[testenv]commands}

[testenv:lint]
description = Lint source, tests, examples, docs, and workflow docs
skip_install = true
deps = ruff>=0.8.0
commands =
    ruff check src tests examples README.md docs

[testenv:typecheck]
description = Type-check public package code
deps = .[all,typing]
commands =
    mypy src/extended_data

[testenv:audit]
description = Audit locked runtime, test, typing, and optional integration dependencies
deps =
    .[all,tests,typing]
    pip-audit==2.10.0
commands =
    pip-audit --skip-editable

[testenv:examples]
description = Run safe example contract tests
deps = .[all,tests]
commands =
    pytest tests/examples {posargs}

[testenv:docs]
description = Build Sphinx docs and generated autodoc2 API reference
deps = .[docs]
commands =
    sphinx-build -W -E -b html docs docs/_build/html {posargs}

[testenv:build]
description = Build source and wheel distributions
skip_install = true
allowlist_externals = uv
commands =
    uv build
