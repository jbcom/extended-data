[tox]
requires =
    tox>=4.11
    tox-uv>=1.11
    tox-gh>=1.3
env_list =
    lint
    typecheck
    audit
    py311
    py312
    py313
    py314
    examples
    docs
    build
min_version = 4.11
skip_missing_interpreters = false

[gh]
python =
    3.11 = py311
    3.12 = py312
    3.13 = py313
    3.14 = py314

[testenv]
description = Run package tests
package = skip
deps =
    -e packages/extended-data[all,tests]
    -e packages/pytest-extended-data
commands =
    coverage erase
    coverage run -m pytest packages/extended-data/tests packages/pytest-extended-data/tests {posargs}
    coverage combine
    coverage report --show-missing
    coverage xml -o coverage.xml

[testenv:py{311,312,313,314}]
description = Run package tests on Python {base_python}
commands = {[testenv]commands}

[testenv:lint]
description = Lint source, tests, examples, docs, and workflow docs
skip_install = true
deps = ruff>=0.8.0
commands =
    ruff check packages README.md AGENTS.md

[testenv:typecheck]
description = Type-check public package code
deps =
    -e packages/extended-data[all,typing]
    -e packages/pytest-extended-data
commands =
    mypy packages/extended-data/src/extended_data packages/pytest-extended-data/src/pytest_extended_data

[testenv:audit]
description = Audit locked runtime, test, typing, and optional integration dependencies
deps =
    -e packages/extended-data[all,tests,typing]
    -e packages/pytest-extended-data
    pip-audit==2.10.1
commands =
    pip-audit --skip-editable

[testenv:examples]
description = Run safe example contract tests
deps = -e packages/extended-data[all,tests]
commands =
    pytest packages/extended-data/tests/examples {posargs}

[testenv:docs]
description = Build Sphinx docs and generated autodoc2 API reference
deps = -e packages/extended-data[docs]
commands_pre =
    python -c "import shutil; shutil.rmtree('packages/extended-data/docs/_build/html', ignore_errors=True)"
commands =
    sphinx-build -W -E -b html packages/extended-data/docs packages/extended-data/docs/_build/html {posargs}

[testenv:build]
description = Build source and wheel distributions
skip_install = true
allowlist_externals = uv
commands =
    uv build --package extended-data --out-dir dist/extended-data --clear
    uv build --package pytest-extended-data --out-dir dist/pytest-extended-data --clear
